<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
</head>

<body>

<h1>Painel de Sugestões</h1>
<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

async function carregarSugestoes() {
  const { data, error } = await client
    .from('sugestoes')
    .select('*')

  console.log("DATA:", data)
  console.log("ERROR:", error)

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  if (!data || data.length === 0) {
    lista.innerHTML = "<p>Nenhuma sugestão encontrada.</p>"
    return
  }

  data.forEach(s => {
    const div = document.createElement("div")
    div.innerHTML = `
      <p>${s.mensagem}</p>
      <button onclick="aprovar(${s.id})">Aprovar</button>
      <button onclick="rejeitar(${s.id})">Rejeitar</button>
      <hr>
    `
    lista.appendChild(div)
  })
}

async function aprovar(id) {
  await client.from('sugestoes')
    .update({ status: 'aprovado' })
    .eq('id', id)

  carregarSugestoes()
}

async function rejeitar(id) {
  await client.from('sugestoes')
    .update({ status: 'rejeitado' })
    .eq('id', id)

  carregarSugestoes()
}

carregarSugestoes()
</script>

</body>
</html>
