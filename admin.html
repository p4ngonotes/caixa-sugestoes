<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #020617, #000);
      color: #e2e8f0;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .topo {
      margin-bottom: 20px;
    }

    .topo img {
      width: 70px;
      margin-bottom: 10px;
      filter: brightness(0) invert(1);
    }

    .topo h1 {
      color: #facc15;
      margin: 0;
    }

    .container {
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 20px rgba(250, 204, 21, 0.2);
    }

    .card {
      background: #020617;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .aprovar {
      background: #22c55e;
      color: black;
    }

    .rejeitar {
      background: #ef4444;
      color: white;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="topo">
  <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
  <h1>Painel Admin</h1>
  <p>Controle das sugestões 👁️</p>
</div>

<div class="container" id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// 🔒 SENHA
const senhaCorreta = "axolote0607"
const senha = prompt("Senha do admin:")

if (senha !== senhaCorreta) {
  document.body.innerHTML = "<h1>Acesso negado</h1>"
  throw new Error("bloqueado")
}

// 🔗 CONEXÃO
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

// 🔄 CARREGAR PENDENTES
async function carregarSugestoes() {
  const { data } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'pendente')

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  if (!data || data.length === 0) {
    lista.innerHTML = "<p>Nada pendente...</p>"
    return
  }

  data.forEach(s => {
    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <p><strong>${s.sugestao}</strong></p>
      <p>Turma: ${s.turma || "?"}</p>

      <button class="aprovar" onclick="aprovar(${s.id})">✔ Aprovar</button>
      <button class="rejeitar" onclick="rejeitar(${s.id})">✖ Rejeitar</button>
    `

    lista.appendChild(div)
  })
}

// ✅ APROVAR
async function aprovar(id) {
  await client.from('sugestoes')
    .update({ status: 'aprovado' })
    .match({ id: id })

  location.reload()
}

// ❌ REJEITAR
async function rejeitar(id) {
  await client.from('sugestoes')
    .update({ status: 'rejeitado' })
    .match({ id: id })

  location.reload()
}

carregarSugestoes()

</script>

</body>
</html>
