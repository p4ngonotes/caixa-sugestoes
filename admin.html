<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
</head>

<body>

<h1>Painel de Sugestões</h1>

<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

// 🔄 Carregar sugestões pendentes
async function carregarSugestoes() {
  const { data, error } = await supabase
    .from('sugestoes')
    .select('*')
    .eq('status', 'pendente')

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  if (data && data.length > 0) {
    data.forEach(s => {
      const div = document.createElement("div")
      div.style.border = "1px solid #ccc"
      div.style.padding = "10px"
      div.style.margin = "10px 0"

      div.innerHTML = `
        <p><strong>Mensagem:</strong> ${s.mensagem}</p>
        <button onclick="aprovar(${s.id})">✅ Aprovar</button>
        <button onclick="rejeitar(${s.id})">❌ Rejeitar</button>
      `

      lista.appendChild(div)
    })
  } else {
    lista.innerHTML = "<p>Nenhuma sugestão pendente.</p>"
  }
}

// ✅ Aprovar sugestão
async function aprovar(id) {
  await supabase
    .from('sugestoes')
    .update({ status: 'aprovado' })
    .eq('id', id)

  carregarSugestoes()
}

// ❌ Rejeitar sugestão
async function rejeitar(id) {
  await supabase
    .from('sugestoes')
    .update({ status: 'rejeitado' })
    .eq('id', id)

  carregarSugestoes()
}

// 🚀 Iniciar
carregarSugestoes()
</script>

</body>
</html>
