<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
</head>

<body>

<h1>Painel de Sugestões</h1>
<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>const senhaCorreta = "axolote0607"

const senha = prompt("Digite a senha do admin:")

if (senha !== senhaCorreta) {
  document.body.innerHTML = "<h1>Acesso negado</h1>"
  throw new Error("Acesso bloqueado")
}
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

// 🔄 Carregar sugestões pendentes
async function carregarSugestoes() {
  const { data, error } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'pendente')

  console.log("DATA:", data)
  console.log("ERROR:", error)

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  if (!data || data.length === 0) {
    lista.innerHTML = "<p>Nenhuma sugestão pendente.</p>"
    return
  }

  data.forEach(s => {
    const div = document.createElement("div")

    div.innerHTML = `
      <p><strong>Sugestão:</strong> ${s.sugestao}</p>
      <p><strong>Turma:</strong> ${s.turma || "Não informado"}</p>
      <button onclick="aprovar(${s.id})">✅ Aprovar</button>
      <button onclick="rejeitar(${s.id})">❌ Rejeitar</button>
      <hr>
    `

    lista.appendChild(div)
  })
}

// ✅ Aprovar (FORÇANDO UPDATE CORRETO)
async function aprovar(id) {
  const { error } = await client
    .from('sugestoes')
    .update({ status: 'aprovado' })
    .match({ id: id }) // 🔥 MAIS FORTE QUE eq

  console.log("APROVAR ERROR:", error)

  location.reload()
}

// ❌ Rejeitar (FORÇANDO UPDATE CORRETO)
async function rejeitar(id) {
  const { error } = await client
    .from('sugestoes')
    .update({ status: 'rejeitado' })
    .match({ id: id }) // 🔥 MAIS FORTE QUE eq

  console.log("REJEITAR ERROR:", error)

  location.reload()
}

// 🚀 Iniciar
carregarSugestoes()
</script>

</body>
</html>
