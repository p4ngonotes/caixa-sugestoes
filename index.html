<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adherbal Vox</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .logo img {
      width: 80px;
      margin-bottom: 10px;
    }

    .logo h1 {
      margin: 0;
      color: #a5b4fc;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: 20px auto;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    textarea {
      height: 100px;
    }

    button {
      padding: 12px;
      width: 95%;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .sucesso {
      margin-top: 10px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<div class="logo">
  <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png">
  <h1>Adherbal Vox</h1>
  <p>Sua voz na escola</p>
</div>

<div class="container">
  <h2>Envie sua sugestão</h2>

  <input type="text" id="turma" placeholder="Turma (opcional)">
  <textarea id="sugestao" placeholder="Escreva sua sugestão..."></textarea>

  <button onclick="enviar()">Enviar</button>

  <div class="sucesso" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

async function enviar() {
  let sugestao = document.getElementById("sugestao").value
  let turma = document.getElementById("turma").value

  // 🔒 VALIDAÇÃO BÁSICA
  if (sugestao.trim() === "") {
    alert("Digite uma sugestão válida!")
    return
  }

  // 🔒 TAMANHO
  if (sugestao.length < 10) {
    alert("A sugestão precisa ter pelo menos 10 caracteres!")
    return
  }

  if (sugestao.length > 300) {
    alert("Máximo de 300 caracteres!")
    return
  }

  // 🔒 FILTRO DE PALAVRAS
  const proibidas = [
    "merda","porra","caralho","foda","foder","nazismo","fuder",
    "pika","piroca","buceta","viado","gay","abusador","abusado",
    "molestado","estuprado","estupro","estuprador","nazista",
    "epstein","cu"
  ]

  let texto = sugestao.toLowerCase()

  for (let palavra of proibidas) {
    if (texto.includes(palavra)) {
      alert("Sua sugestão contém palavras inadequadas!")
      return
    }
  }

  // 🚀 ENVIO
  await client.from('sugestoes').insert([
    {
      sugestao: sugestao,
      turma: turma,
      status: "pendente"
    }
  ])

  document.getElementById("msg").innerText = "Enviado com sucesso! ✅"

  document.getElementById("sugestao").value = ""
  document.getElementById("turma").value = ""
}
</script>

</body>
</html>
