<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #020617);
  color: #fefce8;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  color: #facc15;
}

/* 🔥 CARDS MAIS MARCANTES */
.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 14px;
  border: 2px solid #facc15;
  box-shadow: 0 0 15px rgba(250,204,21,0.35);
}

/* 🔥 CAMPOS MAIS VISÍVEIS */
textarea, select {
  width: 100%;
  border-radius: 10px;
  border: 2px solid #facc15;
  padding: 10px;
  margin-top: 10px;
  background: #020617;
  color: #fefce8;
}

textarea {
  height: 120px;
}

/* 🔥 BOTÃO MAIS VIVO */
button {
  margin-top: 15px;
  padding: 10px 15px;
  border-radius: 10px;
  border: 2px solid #facc15;
  background: #facc15;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #facc15;
}

/* 👁️ SERAFIM */
.serafim {
  font-size: 42px;
  margin-bottom: 10px;
  letter-spacing: 5px;
  animation: brilho 3s infinite;
}

@keyframes brilho {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.mensagem {
  margin-top: 10px;
}
</style>
