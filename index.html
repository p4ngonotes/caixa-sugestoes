<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Adherbal Vox - Sugestões</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #020617);
  color: #fefce8;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  color: #facc15;
}

.icone {
  font-size: 40px;
  margin-bottom: 10px;
}

/* CARD */
.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  border: 2px solid #facc15;
  box-shadow: 0 0 12px rgba(250,204,21,0.3);
}

/* INPUTS */
textarea, select {
  width: 100%;
  border-radius: 10px;
  border: 2px solid #facc15;
  padding: 10px;
  margin-top: 10px;
  background: #020617;
  color: #fefce8;
}

textarea {
  height: 120px;
}

/* BOTÃO */
button {
  margin-top: 15px;
  padding: 10px 15px;
  border-radius: 10px;
  border: 2px solid #facc15;
  background: #facc15;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 10px #facc15;
}

/* MENSAGEM */
.mensagem {
  margin-top: 10px;
  min-height: 20px;
}
</style>
</head>

<body>

<div class="container">

<div class="icone">👁️ ⭐ 📺</div>

<h1>Adherbal Vox</h1>
<p>Envie sua sugestão de forma anônima</p>

<div class="card">

<select id="turma">
  <option value="">Selecione sua turma</option>
  <option>6A</option><option>6B</option>
  <option>7A</option><option>7B</option>
  <option>8A</option><option>8B</option>
  <option>9A</option><option>9B</option><option>9C</option>
  <option>1A</option><option>1B</option><option>1C</option>
  <option>2A</option><option>2B</option><option>2C</option>
  <option>3A</option><option>3B</option><option>3C</option>
</select>

<textarea id="texto" placeholder="Digite sua sugestão..."></textarea>

<button onclick="enviar()">Enviar</button>

<p class="mensagem" id="msg"></p>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// conexão segura
const client = window.supabase.createClient(
  "https://tjoormwrszetarhlfpmt.supabase.co",
  "sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD"
)

// palavras proibidas
const palavrasProibidas = [
  "merda","porra","caralho","foda","foder","nazismo","fuder",
  "pika","piroca","buceta","viado","gay","abusador","abusado",
  "molestado","estuprado","estupro","estuprador","nazista","epstein","cu"
]

// enviar
async function enviar() {

  const texto = document.getElementById("texto").value.trim()
  const turma = document.getElementById("turma").value
  const msg = document.getElementById("msg")

  msg.innerText = ""

  if (!turma) {
    msg.innerText = "Selecione sua turma!"
    return
  }

  if (texto.length < 5) {
    msg.innerText = "Sugestão muito curta!"
    return
  }

  // filtro correto (não quebra "cuidar")
  for (let palavra of palavrasProibidas) {
    const regex = new RegExp(`\\b${palavra}\\b`, "i")
    if (regex.test(texto)) {
      msg.innerText = "Sugestão contém palavras inadequadas!"
      return
    }
  }

  const { error } = await client
    .from("sugestoes")
    .insert([{ sugestao: texto, turma: turma, status: "pendente" }])

  if (error) {
    msg.innerText = "Erro ao enviar 😬"
  } else {
    msg.innerText = "Sugestão enviada com sucesso! ✅"
    document.getElementById("texto").value = ""
    document.getElementById("turma").value = ""
  }
}

</script>

</body>
</html>
