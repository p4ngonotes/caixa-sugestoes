<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adherbal Vox</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h1 {
      margin: 0;
      font-size: 28px;
      color: #a5b4fc;
    }

    .logo p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .logo img {
      width: 60px;
      margin-bottom: 10px;
      filter: brightness(0) invert(1);
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4f46e5;
      transform: scale(1.02);
    }

    .sucesso {
      text-align: center;
      margin-top: 10px;
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="logo">
  <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" alt="Águia">
  <h1>Adherbal Vox</h1>
  <p>Sua voz na escola</p>
</div>

<div class="container">
  <h2>📩 Envie sua sugestão</h2>

  <input type="text" id="turma" placeholder="Sua turma (opcional)">
  <textarea id="sugestao" placeholder="Escreva sua sugestão..."></textarea>

  <button onclick="enviar()">Enviar</button>

  <div class="sucesso" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

async function enviar() {
  const sugestao = document.getElementById("sugestao").value
  const turma = document.getElementById("turma").value

  if (!sugestao) {
    alert("Escreva uma sugestão!")
    return
  }

  await client.from('sugestoes').insert([
    {
      sugestao: sugestao,
      turma: turma,
      status: "pendente"
    }
  ])

  document.getElementById("msg").innerText = "Sugestão enviada com sucesso! ✅"

  document.getElementById("sugestao").value = ""
  document.getElementById("turma").value = ""
}
</script>

</body>
</html>
