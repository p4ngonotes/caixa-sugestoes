<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adherbal Vox - Coordenação</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #a5b4fc;
    }

    .logo img {
      width: 60px;
      margin-bottom: 10px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #0f172a;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }

    .turma {
      font-size: 12px;
      color: #94a3b8;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="logo">
  <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png">
  <h1>Adherbal Vox</h1>
  <p>Painel da Coordenação</p>
</div>

<div class="container">
  <h2>📌 Sugestões Aprovadas</h2>
  <div id="lista"></div>

  <h2>✔ Resolvidas</h2>
  <div id="resolvidas"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// 🔒 SENHA
const senhaCorreta = "itape0607"
const senha = prompt("Senha da coordenação:")

if (senha !== senhaCorreta) {
  document.body.innerHTML = "<h1>Acesso negado</h1>"
  throw new Error("bloqueado")
}

// 🔗 CONEXÃO
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

// 🔄 CARREGAR
async function carregarSugestoes() {
  const lista = document.getElementById("lista")
  const resolvidas = document.getElementById("resolvidas")

  lista.innerHTML = ""
  resolvidas.innerHTML = ""

  // APROVADAS
  const { data: aprovadas } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'aprovado')

  // RESOLVIDAS
  const { data: feitas } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'resolvido')

  if (aprovadas && aprovadas.length > 0) {
    aprovadas.forEach(s => {
      const div = document.createElement("div")
      div.className = "card"

      div.innerHTML = `
        <p><strong>${s.sugestao}</strong></p>
        <p class="turma">Turma: ${s.turma || "Não informado"}</p>
        <button onclick="resolver(${s.id})">✔ Resolver</button>
      `

      lista.appendChild(div)
    })
  } else {
    lista.innerHTML = "<p>Nada novo 👀</p>"
  }

  if (feitas && feitas.length > 0) {
    feitas.forEach(s => {
      const div = document.createElement("div")
      div.className = "card"

      div.innerHTML = `
        <p>${s.sugestao}</p>
        <p class="turma">${s.turma || ""}</p>
      `

      resolvidas.appendChild(div)
    })
  } else {
    resolvidas.innerHTML = "<p>Nenhuma resolvida ainda.</p>"
  }
}

// ✔ MARCAR COMO RESOLVIDO
async function resolver(id) {
  await client
    .from('sugestoes')
    .update({ status: 'resolvido' })
    .match({ id: id })

  carregarSugestoes()
}

// 🚀 INICIAR
carregarSugestoes()

</script>

</body>
</html>
