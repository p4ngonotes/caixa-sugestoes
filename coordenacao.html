<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adherbal Vox - Coordenação</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #a5b4fc;
    }

    .logo img {
      width: 60px;
      margin-bottom: 10px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #0f172a;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }

    .turma {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="logo">
  <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png">
  <h1>Adherbal Vox</h1>
  <p>Painel da Coordenação</p>
</div>

<div class="container" id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// 🔒 SENHA
const senhaCorreta = "itape0607"
const senha = prompt("Senha da coordenação:")

if (senha !== senhaCorreta) {
  document.body.innerHTML = "<h1>Acesso negado</h1>"
  throw new Error("bloqueado")
}

// 🔗 CONEXÃO
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

// 🔄 CARREGAR APROVADAS
async function carregarSugestoes() {
  const { data } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'aprovado')

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  if (!data || data.length === 0) {
    lista.innerHTML = "<p>Nenhuma sugestão aprovada ainda.</p>"
    return
  }

  data.forEach(s => {
    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <p><strong>${s.sugestao}</strong></p>
      <p class="turma">Turma: ${s.turma || "Não informado"}</p>
    `

    lista.appendChild(div)
  })
}

carregarSugestoes()

</script>

</body>
</html>
