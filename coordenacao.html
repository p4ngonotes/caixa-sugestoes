<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Adherbal Vox - Coordenação</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #020617);
  color: #fefce8;
  text-align: center;
  margin: 0;
}

/* LOGIN */
.login {
  margin-top: 120px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #334155;
  margin: 10px;
  width: 200px;
  background: #0f172a;
  color: #fefce8;
  outline: none;
}

input:focus {
  border: 1px solid #facc15;
}

button {
  padding: 10px 15px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: #facc15;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* PAINEL */
.painel {
  display: none;
  padding: 20px;
}

h1 {
  color: #facc15;
}

/* CARD MELHORADO (BORDAS CONTORNADAS) */
.card {
  background: #0f172a;
  padding: 15px;
  margin: 15px auto;
  border-radius: 12px;
  max-width: 600px;

  /* 🔥 BORDA CONTORNADA (NOVA) */
  border: 1px solid rgba(250, 204, 21, 0.25);

  /* sombra suave pra dar profundidade */
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);

  transition: 0.2s;
}

.card:hover {
  border: 1px solid rgba(250, 204, 21, 0.6);
  transform: translateY(-2px);
}

/* BOTÕES */
.resolver {
  background: #22c55e;
  color: black;
  border: 1px solid #16a34a;
}

.ocultar {
  background: #facc15;
  color: black;
  border: 1px solid #ca8a04;
}

h2 {
  color: #facc15;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h1>Adherbal Vox 👁️</h1>
  <p>Painel da Coordenação</p>

  <input type="password" id="senha" placeholder="Digite a senha">
  <br>
  <button onclick="entrar()">Entrar</button>

  <p id="erro" style="color:red;"></p>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">

  <h2>📌 Aprovadas</h2>
  <div id="lista"></div>

  <h2>✔ Resolvidas</h2>
  <div id="resolvidas"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const senhaCorreta = "itape0607"

function entrar() {
  const senha = document.getElementById("senha").value

  if (senha === senhaCorreta) {
    document.getElementById("login").style.display = "none"
    document.getElementById("painel").style.display = "block"
    carregarSugestoes()
  } else {
    document.getElementById("erro").innerText = "Senha incorreta!"
  }
}

const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

async function carregarSugestoes() {

  const lista = document.getElementById("lista")
  const resolvidas = document.getElementById("resolvidas")

  lista.innerHTML = ""
  resolvidas.innerHTML = ""

  const { data: aprovadas, error: err1 } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'aprovado')

  const { data: feitas, error: err2 } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'resolvido')

  if (err1 || err2) {
    lista.innerHTML = "<p>Erro ao carregar dados 😬</p>"
    return
  }

  if (aprovadas && aprovadas.length > 0) {
    aprovadas.forEach(s => {
      lista.innerHTML += `
        <div class="card">
          <p><strong>${s.sugestao}</strong></p>
          <button class="resolver" onclick="resolver(${s.id})">✔ Resolver</button>
        </div>
      `
    })
  } else {
    lista.innerHTML = "<p>Nada pendente 👀</p>"
  }

  if (feitas && feitas.length > 0) {
    feitas.forEach(s => {
      resolvidas.innerHTML += `
        <div class="card">
          <p>${s.sugestao}</p>
          <button class="ocultar" onclick="ocultar(${s.id})">👁️ Ocultar</button>
        </div>
      `
    })
  } else {
    resolvidas.innerHTML = "<p>Todas já foram ocultadas ✅</p>"
  }
}

async function resolver(id) {
  await client
    .from('sugestoes')
    .update({ status: 'resolvido' })
    .match({ id: id })

  carregarSugestoes()
}

async function ocultar(id) {
  await client
    .from('sugestoes')
    .update({ status: 'oculto' })
    .match({ id: id })

  carregarSugestoes()
}

</script>

</body>
</html>
