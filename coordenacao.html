<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adherbal Vox - Coordenação</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #09090b);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .logo {
      margin-bottom: 20px;
    }

    .olho {
      font-size: 40px;
      margin-bottom: 10px;
      animation: piscar 4s infinite;
    }

    @keyframes piscar {
      0%, 95%, 100% { opacity: 1; }
      97% { opacity: 0; }
    }

    h1 {
      color: #a5b4fc;
      margin: 0;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #0f172a;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(99,102,241,0.2);
    }

    .turma {
      font-size: 12px;
      color: #94a3b8;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .resolver {
      background: #22c55e;
      color: black;
    }

    .ocultar {
      background: #64748b;
      color: white;
    }

    h2 {
      margin-top: 30px;
      color: #c7d2fe;
    }
  </style>
</head>

<body>

<div class="logo">
  <div class="olho">👁️</div>
  <h1>Adherbal Vox</h1>
  <p>Painel da Coordenação</p>
</div>

<div class="container">

  <h2>📌 Sugestões Aprovadas</h2>
  <div id="lista"></div>

  <h2>✔ Resolvidas</h2>
  <div id="resolvidas"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// 🔒 SENHA
const senhaCorreta = "itape0607"
const senha = prompt("Senha da coordenação:")

if (senha !== senhaCorreta) {
  document.body.innerHTML = "<h1>Acesso negado</h1>"
  throw new Error("bloqueado")
}

// 🔗 CONEXÃO
const supabaseUrl = 'https://tjoormwrszetarhlfpmt.supabase.co'
const supabaseKey = 'sb_publishable_zOCfyuybTdMRFnc__LB_Sg_puROfwrD'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

// 🔄 CARREGAR
async function carregarSugestoes() {

  const lista = document.getElementById("lista")
  const resolvidas = document.getElementById("resolvidas")

  lista.innerHTML = ""
  resolvidas.innerHTML = ""

  const { data: aprovadas } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'aprovado')

  const { data: feitas } = await client
    .from('sugestoes')
    .select('*')
    .eq('status', 'resolvido')

  // APROVADAS
  if (aprovadas && aprovadas.length > 0) {
    aprovadas.forEach(s => {

      const div = document.createElement("div")
      div.className = "card"

      div.innerHTML = `
        <p><strong>${s.sugestao}</strong></p>
        <p class="turma">Turma: ${s.turma || "Não informado"}</p>

        <button class="resolver" onclick="resolver(${s.id})">✔ Resolver</button>
        <button class="ocultar" onclick="ocultar(${s.id})">👁️ Parar de exibir</button>
      `

      lista.appendChild(div)
    })
  } else {
    lista.innerHTML = "<p>Nada novo 👀</p>"
  }

  // RESOLVIDAS
  if (feitas && feitas.length > 0) {
    feitas.forEach(s => {

      const div = document.createElement("div")
      div.className = "card"

      div.innerHTML = `
        <p>${s.sugestao}</p>
        <p class="turma">${s.turma || ""}</p>
      `

      resolvidas.appendChild(div)
    })
  } else {
    resolvidas.innerHTML = "<p>Nenhuma resolvida ainda.</p>"
  }
}

// ✔ RESOLVER
async function resolver(id) {
  await client
    .from('sugestoes')
    .update({ status: 'resolvido' })
    .match({ id: id })

  carregarSugestoes()
}

// 👁️ OCULTAR
async function ocultar(id) {
  await client
    .from('sugestoes')
    .update({ status: 'oculto' })
    .match({ id: id })

  carregarSugestoes()
}

// 🚀 INICIAR
carregarSugestoes()

</script>

</body>
</html>
